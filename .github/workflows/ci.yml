name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Verify 5 direct Swiss Ephemeris fixtures (including USSR dates)
        run: uv run python scripts/verify_fixtures.py

      - name: Test (pytest — includes golden-chart regression)
        run: uv run pytest -q
