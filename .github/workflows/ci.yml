name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest — includes golden-chart regression)
        run: uv run pytest -q
